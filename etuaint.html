<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GradeFlow — Espace Étudiant</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0f14;
      --bg2: #13161e;
      --bg3: #1a1e28;
      --bg4: #222636;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.13);
      --text: #e8eaf0;
      --text2: #8b90a7;
      --text3: #555b72;
      --accent: #4f7ef8; /* Bleu étudiant */
      --accent2: #3d6be8;
      --green: #2dd882;
      --green-bg: rgba(45,216,130,0.1);
      --amber: #f5a623;
      --amber-bg: rgba(245,166,35,0.1);
      --red: #f05252;
      --red-bg: rgba(240,82,82,0.1);
      --blue-bg: rgba(79,126,248,0.1);
      --radius: 12px;
      --radius-sm: 8px;
      --radius-xs: 6px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }

    .screen { display: flex; flex-direction: column; min-height: 100vh; }

    /* DASHBOARD ELEMENTS */
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 28px; background: var(--bg2); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .topbar-left { display: flex; align-items: center; gap: 14px; }
    .tb-brand { display: flex; align-items: center; gap: 8px; }
    .tb-brand-dot { width: 28px; height: 28px; background: var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .tb-brand-name { font-size: 15px; font-weight: 700; }
    .tb-divider { width: 1px; height: 20px; background: var(--border2); }
    .tb-avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
    .tb-avatar.blue { background: var(--blue-bg); color: var(--accent); border: 1px solid rgba(79,126,248,0.25); }
    .tb-info .tb-name { font-size: 13px; font-weight: 600; }
    .tb-info .tb-role { font-size: 11px; color: var(--text2); }

    .dash-body { flex: 1; padding: 28px; display: flex; flex-direction: column; gap: 22px; max-width: 1100px; width: 100%; margin: 0 auto; }
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 14px; }
    .stat-box { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; }
    .stat-box-label { font-size: 11px; color: var(--text2); font-weight: 500; text-transform: uppercase; margin-bottom: 8px; }
    .stat-box-value { font-size: 26px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .stat-box-value.green { color: var(--green); }
    .stat-box-value.blue { color: var(--accent); }
    .stat-box-value.amber { color: var(--amber); }

    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); }
    .card-title { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .card-body { padding: 20px; }
    .card-body-flush { padding: 0; }

    .big-avg { font-size: 56px; font-weight: 700; letter-spacing: -3px; font-family: 'JetBrains Mono', monospace; }
    .big-avg.green { color: var(--green); }
    .big-avg.amber { color: var(--amber); }
    .big-avg.red { color: var(--red); }
    .big-avg-sub { font-size: 16px; color: var(--text2); font-family: 'JetBrains Mono', monospace; }
    .avg-display { display: flex; align-items: baseline; gap: 8px; }

    .mat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
    .mat-card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; }
    .mat-name { font-size: 11px; color: var(--text2); font-weight: 500; text-transform: uppercase; margin-bottom: 8px; }
    .mat-val { font-size: 20px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .mat-cnt { font-size: 11px; color: var(--text3); margin-top: 4px; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th { padding: 11px 16px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text2); border-bottom: 1px solid var(--border); background: var(--bg3); }
    tbody td { padding: 13px 16px; border-bottom: 1px solid var(--border); }

    .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge-green { background: var(--green-bg); color: var(--green); }
    .badge-blue { background: var(--blue-bg); color: var(--accent); }
    .badge-amber { background: var(--amber-bg); color: var(--amber); }
    .badge-red { background: var(--red-bg); color: var(--red); }

    .note-chip { display: inline-flex; align-items: center; justify-content: center; min-width: 46px; height: 26px; border-radius: 13px; font-size: 12px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .nc-green { background: var(--green-bg); color: var(--green); }
    .nc-blue { background: var(--blue-bg); color: var(--accent); }
    .nc-amber { background: var(--amber-bg); color: var(--amber); }
    .nc-red { background: var(--red-bg); color: var(--red); }

    .progress-bar-wrap { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; width: 80px; }
    .progress-bar { height: 100%; border-radius: 2px; }
    .empty-state { text-align: center; padding: 3rem 2rem; color: var(--text3); font-size: 13px; }
  </style>
</head>
<body>

<div class="screen">
  <div class="topbar">
    <div class="topbar-left">
      <div class="tb-brand"><div class="tb-brand-dot">📊</div><div class="tb-brand-name">GradeFlow</div></div>
      <div class="tb-divider"></div>
      <div class="tb-avatar blue">AY</div>
      <div class="tb-info">
        <div class="tb-name">Alami Yassine</div>
        <div class="tb-role">Étudiant · Réf: 2023001 (L3-INFO)</div>
      </div>
    </div>
  </div>

  <div class="dash-body">
    <div class="card">
      <div class="card-header"><div class="card-title">📈 Moyenne générale</div></div>
      <div class="card-body" style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">
        <div>
          <div class="avg-display">
            <div class="big-avg" id="etu-moy-big">—</div>
            <div class="big-avg-sub">/20</div>
          </div>
          <div id="etu-mention-badge" style="margin-top:8px"></div>
        </div>
        <div style="flex:1;min-width:200px" id="etu-progress-wrap"></div>
      </div>
    </div>

    <div class="stats-row" id="etu-stats"></div>

    <div class="card">
      <div class="card-header"><div class="card-title">📚 Résultats par matière</div></div>
      <div class="card-body"><div class="mat-grid" id="etu-mat-grid"></div></div>
    </div>

    <div class="card">
      <div class="card-header"><div class="card-title">📄 Détail de mes notes</div></div>
      <div class="card-body-flush" id="etu-notes-detail"></div>
    </div>
  </div>
</div>

<script>
// ID par défaut chargé automatiquement (ici Alami Yassine)
const CURRENT_STUDENT_ID = '2023001';

let notes = [
  { id:1, etuId:'2023001', matiere:'Mathématiques', note:15.5 },
  { id:2, etuId:'2023001', matiere:'Physique', note:12 },
  { id:3, etuId:'2023001', matiere:'Informatique', note:18 },
  { id:4, etuId:'2023001', matiere:'Anglais', note:14 },
  { id:5, etuId:'2023002', matiere:'Mathématiques', note:9.5 },
  { id:6, etuId:'2023002', matiere:'Anglais', note:16 },
  { id:7, etuId:'2023002', matiere:'Informatique', note:13 },
  { id:8, etuId:'2023003', matiere:'Physique', note:13 },
  { id:9, etuId:'2023003', matiere:'Français', note:11 },
  { id:10, etuId:'2023003', matiere:'Chimie', note:8 },
  { id:11, etuId:'2023004', matiere:'Informatique', note:17.5 },
  { id:12, etuId:'2023004', matiere:'Histoire', note:14 },
  { id:13, etuId:'2023004', matiere:'Mathématiques', note:12.5 },
];

function noteColor(n) { return n >= 16 ? 'green' : n >= 12 ? 'blue' : n >= 10 ? 'amber' : 'red'; }
function noteBadge(n) { return 'badge-' + noteColor(n); }
function noteChip(n) { return 'nc-' + noteColor(n); }
function mention(n) { return n >= 16 ? '🏆 Très bien' : n >= 14 ? '✅ Bien' : n >= 12 ? '👍 Assez bien' : n >= 10 ? '📌 Passable' : '❌ Insuffisant'; }
function mentionShort(n) { return n >= 16 ? 'Très bien' : n >= 14 ? 'Bien' : n >= 12 ? 'Assez bien' : n >= 10 ? 'Passable' : 'Insuffisant'; }
function avg(arr) { return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : null; }
function fmt(n) { return n !== null ? Number(n).toFixed(2) : '—'; }

function renderEtuDash(etuId) {
  const eNotes = notes.filter(n=>n.etuId===etuId);
  const moyVal = avg(eNotes.map(n=>n.note));
  const color = moyVal!==null ? noteColor(moyVal) : '';

  const bigEl = document.getElementById('etu-moy-big');
  bigEl.textContent = moyVal!==null ? fmt(moyVal) : '—';
  bigEl.className = 'big-avg ' + color;

  document.getElementById('etu-mention-badge').innerHTML = moyVal!==null ? `<span class="badge badge-${color}" style="font-size:13px;padding:5px 14px">${mention(moyVal)}</span>` : '';

  const pct = moyVal!==null ? Math.round(moyVal/20*100) : 0;
  const progColor = moyVal!==null ? (moyVal>=16?'var(--green)':moyVal>=12?'var(--accent)':moyVal>=10?'var(--amber)':'var(--red)') : 'var(--text3)';
  document.getElementById('etu-progress-wrap').innerHTML = `
    <div style="font-size:11px;color:var(--text2);margin-bottom:6px;text-transform:uppercase;">Progression</div>
    <div style="height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-bottom:6px">
      <div style="height:100%;width:${pct}%;background:${progColor};transition:width .4s"></div>
    </div>
    <div style="font-size:12px;color:var(--text2)">${pct}% de la note maximale</div>
  `;

  const reussi = eNotes.filter(n=>n.note>=10).length;
  const meilleure = eNotes.length ? Math.max(...eNotes.map(n=>n.note)) : null;
  const matiereCount = new Set(eNotes.map(n=>n.matiere)).size;
  document.getElementById('etu-stats').innerHTML = `
    <div class="stat-box"><div class="stat-box-label">Notes reçues</div><div class="stat-box-value blue">${eNotes.length}</div></div>
    <div class="stat-box"><div class="stat-box-label">Matières</div><div class="stat-box-value amber">${matiereCount}</div></div>
    <div class="stat-box"><div class="stat-box-label">Validées (≥10)</div><div class="stat-box-value green">${reussi}/${eNotes.length}</div></div>
    ${meilleure!==null?`<div class="stat-box"><div class="stat-box-label">Meilleure note</div><div class="stat-box-value green">${meilleure}/20</div></div>`:''}
  `;

  const byMat = {};
  eNotes.forEach(n => { if (!byMat[n.matiere]) byMat[n.matiere]=[]; byMat[n.matiere].push(n.note); });
  const matGrid = document.getElementById('etu-mat-grid');
  if (!Object.keys(byMat).length) {
    matGrid.innerHTML = '<div class="empty-state">Aucune note enregistrée.</div>';
  } else {
    matGrid.innerHTML = Object.entries(byMat).map(([mat, ns]) => {
      const m = avg(ns);
      const colors = { green:'var(--green)', blue:'var(--accent)', amber:'var(--amber)', red:'var(--red)' };
      return `<div class="mat-card">
        <div class="mat-name">${mat}</div>
        <div class="mat-val" style="color:${colors[noteColor(m)]}">${fmt(m)}</div>
        <div class="mat-cnt">${ns.length} note(s)</div>
      </div>`;
    }).join('');
  }

  const wrap = document.getElementById('etu-notes-detail');
  if (!eNotes.length) {
    wrap.innerHTML = '<div class="empty-state">Aucune note disponible.</div>';
    return;
  }
  const rows = [...eNotes].sort((a,b)=>b.note-a.note).map(n => `<tr>
    <td style="font-weight:600">${n.matiere}</td>
    <td><span class="note-chip ${noteChip(n.note)}">${n.note}/20</span></td>
    <td><span class="badge ${noteBadge(n.note)}">${mentionShort(n.note)}</span></td>
    <td>
      <div class="progress-bar-wrap" style="width:100px">
        <div class="progress-bar" style="width:${Math.round(n.note/20*100)}%;background:${n.note>=10?'var(--green)':'var(--red)'}"></div>
      </div>
    </td>
  </tr>`).join('');
  wrap.innerHTML = `<table><thead><tr><th>Matière</th><th>Note</th><th>Mention</th><th>Progression</th></tr></thead><tbody>${rows}</tbody></table>`;
}

// Lancement automatique des données de l'étudiant configuré
window.onload = function() {
  renderEtuDash(CURRENT_STUDENT_ID);
};
</script>
</body>
</html>

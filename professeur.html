<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GradeFlow — Espace Professeur</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0f14; --bg2: #13161e; --bg3: #1a1e28; --bg4: #222636;
      --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
      --text: #e8eaf0; --text2: #8b90a7; --text3: #555b72;
      --accent: #4f7ef8; --accent2: #3d6be8;
      --green: #2dd882; --green-bg: rgba(45,216,130,0.1);
      --amber: #f5a623; --amber-bg: rgba(245,166,35,0.1);
      --red: #f05252; --red-bg: rgba(240,82,82,0.1);
      --blue-bg: rgba(79,126,248,0.1);
      --radius: 12px; --radius-sm: 8px; --radius-xs: 6px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 28px; background: var(--bg2); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .topbar-left { display: flex; align-items: center; gap: 14px; }
    .tb-brand { display: flex; align-items: center; gap: 8px; }
    .tb-brand-dot { width: 28px; height: 28px; background: var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .tb-brand-name { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
    .tb-divider { width: 1px; height: 20px; background: var(--border2); }
    .tb-avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; letter-spacing: 0.5px; background: var(--green-bg); color: var(--green); border: 1px solid rgba(45,216,130,0.25); }
    .tb-name { font-size: 13px; font-weight: 600; }
    .tb-role { font-size: 11px; color: var(--text2); }
    .dash-body { padding: 28px; display: flex; flex-direction: column; gap: 22px; max-width: 1100px; width: 100%; margin: 0 auto; }
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 14px; }
    .stat-box { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; }
    .stat-box-label { font-size: 11px; color: var(--text2); font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px; }
    .stat-box-value { font-size: 26px; font-weight: 700; letter-spacing: -1px; font-family: 'JetBrains Mono', monospace; }
    .stat-box-value.green { color: var(--green); }
    .stat-box-value.blue  { color: var(--accent); }
    .stat-box-value.amber { color: var(--amber); }
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .card-title { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .card-body { padding: 20px; }
    .card-body-flush { padding: 0; }
    .tabs-wrap { display: flex; gap: 4px; background: var(--bg3); padding: 4px; border-radius: var(--radius-sm); border: 1px solid var(--border); }
    .tab { flex: 1; padding: 8px 14px; font-size: 13px; font-weight: 500; text-align: center; cursor: pointer; border-radius: 6px; color: var(--text2); background: transparent; border: none; font-family: 'Sora', sans-serif; transition: all 0.18s; }
    .tab.active { background: var(--bg4); color: var(--text); border: 1px solid var(--border2); }
    .tab-panel { display: none; }
    .tab-panel.active { display: flex; flex-direction: column; gap: 18px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr 140px auto; gap: 10px; align-items: end; }
    @media (max-width: 680px) { .form-grid { grid-template-columns: 1fr 1fr; } }
    .field { margin-bottom: 0; }
    .field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; font-weight: 500; letter-spacing: 0.3px; }
    .field input, .field select { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 11px 14px; font-size: 14px; color: var(--text); font-family: 'Sora', sans-serif; transition: border-color 0.2s; }
    .field input:focus, .field select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,126,248,0.12); }
    .field select option { background: var(--bg3); }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px; padding: 11px 20px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; font-family: 'Sora', sans-serif; cursor: pointer; border: none; transition: all 0.18s; }
    .btn-secondary { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--bg4); color: var(--text); }
    .btn-green { background: var(--green); color: #0d1a11; }
    .btn-green:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn-danger { background: var(--red-bg); color: var(--red); border: 1px solid rgba(240,82,82,0.2); }
    .btn-danger:hover { background: rgba(240,82,82,0.2); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .err-msg { background: var(--red-bg); color: var(--red); border: 1px solid rgba(240,82,82,0.2); border-radius: var(--radius-xs); padding: 9px 13px; font-size: 13px; margin-top: 14px; display: none; }
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th { padding: 11px 16px; text-align: left; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: var(--text2); border-bottom: 1px solid var(--border); background: var(--bg3); }
    tbody td { padding: 13px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: var(--bg3); }
    tbody tr.editing td { background: rgba(245,166,35,0.05); }
    .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge-green { background: var(--green-bg); color: var(--green); }
    .badge-blue  { background: var(--blue-bg);  color: var(--accent); }
    .badge-amber { background: var(--amber-bg); color: var(--amber); }
    .badge-red   { background: var(--red-bg);   color: var(--red); }
    .note-chip { display: inline-flex; align-items: center; justify-content: center; min-width: 46px; height: 26px; border-radius: 13px; font-size: 12px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .nc-green { background: var(--green-bg); color: var(--green); }
    .nc-blue  { background: var(--blue-bg);  color: var(--accent); }
    .nc-amber { background: var(--amber-bg); color: var(--amber); }
    .nc-red   { background: var(--red-bg);   color: var(--red); }
    .stu-list { display: flex; flex-direction: column; gap: 8px; }
    .stu-row { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); }
    .stu-row:hover { border-color: var(--border2); background: var(--bg4); }
    .stu-left { display: flex; align-items: center; gap: 12px; }
    .stu-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--blue-bg); color: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; border: 1px solid rgba(79,126,248,0.2); }
    .stu-name { font-size: 13px; font-weight: 600; }
    .stu-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
    .stu-right { display: flex; align-items: center; gap: 10px; }
    .edit-input { background: var(--bg4); border: 1px solid var(--amber); border-radius: var(--radius-xs); padding: 5px 10px; font-size: 13px; font-weight: 600; color: var(--amber); font-family: 'JetBrains Mono', monospace; width: 70px; }
    .edit-input:focus { outline: none; }
    .filter-bar { display: flex; gap: 8px; }
    .filter-select { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-xs); padding: 6px 12px; font-size: 12px; color: var(--text2); font-family: 'Sora', sans-serif; cursor: pointer; }
    .filter-select:focus { outline: none; border-color: var(--accent); }
    .empty-state { text-align: center; padding: 3rem 2rem; color: var(--text3); font-size: 13px; }
    .empty-state-icon { font-size: 32px; display: block; margin-bottom: 12px; opacity: 0.4; }
    .progress-bar-wrap { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; width: 80px; }
    .progress-bar { height: 100%; border-radius: 2px; }
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--bg4); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 12px 18px; font-size: 13px; box-shadow: var(--shadow); transform: translateY(80px); opacity: 0; transition: all 0.3s; z-index: 9999; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: rgba(45,216,130,0.3); }
    .toast.error   { border-color: rgba(240,82,82,0.3); }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="tb-brand">
      <div class="tb-brand-dot">📊</div>
      <div class="tb-brand-name">GradeFlow</div>
    </div>
    <div class="tb-divider"></div>
    <div class="tb-avatar">MP</div>
    <div>
      <div class="tb-name">Prof. Martin Paul</div>
      <div class="tb-role">Enseignant · Tableau de bord</div>
    </div>
  </div>
</div>

<div class="dash-body">
  <div class="stats-row" id="prof-stats"></div>

  <div class="tabs-wrap" id="tabs-prof">
    <button class="tab active" onclick="switchTab('t-saisie','t-liste','t-etudiants')">✏️ Saisir une note</button>
    <button class="tab" onclick="switchTab('t-liste','t-saisie','t-etudiants')">📋 Toutes les notes</button>
    <button class="tab" onclick="switchTab('t-etudiants','t-saisie','t-liste')">👥 Étudiants</button>
  </div>

  <!-- TAB: SAISIE -->
  <div class="tab-panel active" id="t-saisie">
    <div class="card">
      <div class="card-header"><div class="card-title">➕ Nouvelle note</div></div>
      <div class="card-body">
        <div class="form-grid">
          <div class="field"><label>ÉTUDIANT</label><select id="sel-etu"></select></div>
          <div class="field">
            <label>MATIÈRE</label>
            <select id="sel-mat">
              <option value="">— Choisir —</option>
              <option>Mathématiques</option><option>Physique</option><option>Informatique</option>
              <option>Français</option><option>Anglais</option><option>Histoire</option>
              <option>Chimie</option><option>Philosophie</option>
            </select>
          </div>
          <div class="field"><label>NOTE /20</label><input type="number" id="inp-note" min="0" max="20" step="0.5" placeholder="0 – 20" /></div>
          <button class="btn btn-green" onclick="addNote()">+ Ajouter</button>
        </div>
        <div class="err-msg" id="err-note"></div>
      </div>
    </div>
  </div>

  <!-- TAB: LISTE -->
  <div class="tab-panel" id="t-liste">
    <div class="card">
      <div class="card-header">
        <div class="card-title">📋 Toutes les notes</div>
        <div class="filter-bar">
          <select class="filter-select" id="filter-mat" onchange="renderTableProf()">
            <option value="">Toutes matières</option>
            <option>Mathématiques</option><option>Physique</option><option>Informatique</option>
            <option>Français</option><option>Anglais</option><option>Histoire</option>
            <option>Chimie</option><option>Philosophie</option>
          </select>
          <select class="filter-select" id="filter-etu" onchange="renderTableProf()">
            <option value="">Tous étudiants</option>
          </select>
        </div>
      </div>
      <div class="card-body-flush tbl-wrap"><div id="table-all-notes"></div></div>
    </div>
  </div>

  <!-- TAB: ÉTUDIANTS -->
  <div class="tab-panel" id="t-etudiants">
    <div class="card">
      <div class="card-header"><div class="card-title">👥 Résumé par étudiant</div></div>
      <div class="card-body"><div class="stu-list" id="stu-list-prof"></div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const ETUDIANTS = {
  '2023001': { nom: 'Alami Yassine',   initiales: 'AY', groupe: 'L3-INFO' },
  '2023002': { nom: 'El Fassi Fatima', initiales: 'EF', groupe: 'L3-INFO' },
  '2023003': { nom: 'Ouali Mehdi',     initiales: 'OM', groupe: 'L2-PHY'  },
  '2023004': { nom: 'Ziani Amira',     initiales: 'ZA', groupe: 'L2-PHY'  },
};
let notes = [
  { id:1,  etuId:'2023001', matiere:'Mathématiques', note:15.5 },
  { id:2,  etuId:'2023001', matiere:'Physique',       note:12   },
  { id:3,  etuId:'2023001', matiere:'Informatique',   note:18   },
  { id:4,  etuId:'2023001', matiere:'Anglais',        note:14   },
  { id:5,  etuId:'2023002', matiere:'Mathématiques', note:9.5  },
  { id:6,  etuId:'2023002', matiere:'Anglais',        note:16   },
  { id:7,  etuId:'2023002', matiere:'Informatique',   note:13   },
  { id:8,  etuId:'2023003', matiere:'Physique',       note:13   },
  { id:9,  etuId:'2023003', matiere:'Français',       note:11   },
  { id:10, etuId:'2023003', matiere:'Chimie',         note:8    },
  { id:11, etuId:'2023004', matiere:'Informatique',   note:17.5 },
  { id:12, etuId:'2023004', matiere:'Histoire',       note:14   },
  { id:13, etuId:'2023004', matiere:'Mathématiques', note:12.5 },
];
let nextId = 14;

function noteColor(n) { return n>=16?'green':n>=12?'blue':n>=10?'amber':'red'; }
function noteBadge(n) { return 'badge-'+noteColor(n); }
function noteChip(n)  { return 'nc-'+noteColor(n); }
function mentionShort(n) { return n>=16?'Très bien':n>=14?'Bien':n>=12?'Assez bien':n>=10?'Passable':'Insuffisant'; }
function avg(arr) { return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : null; }
function fmt(n, d=2) { return n!==null ? Number(n).toFixed(d) : '—'; }

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = (type==='success'?'✓ ':'✗ ')+msg;
  t.className = 'toast show '+type;
  setTimeout(() => t.className='toast', 2800);
}

function populateSelEtu() {
  const sel = document.getElementById('sel-etu');
  sel.innerHTML = '<option value="">— Choisir un étudiant —</option>';
  Object.entries(ETUDIANTS).forEach(([id,e]) => sel.innerHTML += `<option value="${id}">${e.nom} (${id})</option>`);
}
function populateFilterEtu() {
  const sel = document.getElementById('filter-etu');
  sel.innerHTML = '<option value="">Tous étudiants</option>';
  Object.entries(ETUDIANTS).forEach(([id,e]) => sel.innerHTML += `<option value="${id}">${e.nom}</option>`);
}

function renderProfStats() {
  const total  = notes.length;
  const moyVal = avg(notes.map(n=>n.note));
  const reussi = notes.filter(n=>n.note>=10).length;
  const etuSet = new Set(notes.map(n=>n.etuId)).size;
  document.getElementById('prof-stats').innerHTML = `
    <div class="stat-box"><div class="stat-box-label">Notes saisies</div><div class="stat-box-value blue">${total}</div></div>
    <div class="stat-box"><div class="stat-box-label">Moyenne classe</div><div class="stat-box-value ${noteColor(moyVal||0)}">${fmt(moyVal)}</div></div>
    <div class="stat-box"><div class="stat-box-label">Taux de réussite</div><div class="stat-box-value green">${total?Math.round(reussi/total*100):0}%</div></div>
    <div class="stat-box"><div class="stat-box-label">Étudiants notés</div><div class="stat-box-value amber">${etuSet}</div></div>`;
}

function renderTableProf() {
  const fMat = document.getElementById('filter-mat').value||'';
  const fEtu = document.getElementById('filter-etu').value||'';
  let filtered = notes;
  if (fMat) filtered = filtered.filter(n=>n.matiere===fMat);
  if (fEtu) filtered = filtered.filter(n=>n.etuId===fEtu);
  const wrap = document.getElementById('table-all-notes');
  if (!filtered.length) { wrap.innerHTML=`<div class="empty-state"><span class="empty-state-icon">📭</span>Aucune note trouvée.</div>`; return; }
  const rows = filtered.map(n => {
    const e = ETUDIANTS[n.etuId];
    return `<tr id="row-${n.id}">
      <td><div style="display:flex;align-items:center;gap:8px">
        <div style="width:28px;height:28px;border-radius:50%;background:var(--blue-bg);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0">${e?e.initiales:'??'}</div>
        <div><div style="font-weight:600;font-size:13px">${e?e.nom:n.etuId}</div><div style="font-size:11px;color:var(--text2)">${e?e.groupe:''}</div></div>
      </div></td>
      <td>${n.matiere}</td>
      <td><span class="note-chip ${noteChip(n.note)}">${n.note}/20</span></td>
      <td><span class="badge ${noteBadge(n.note)}">${mentionShort(n.note)}</span></td>
      <td style="white-space:nowrap">
        <button class="btn btn-secondary btn-sm" onclick="startEdit(${n.id})" style="margin-right:6px">✏️ Modifier</button>
        <button class="btn btn-danger btn-sm" onclick="delNote(${n.id})">🗑 Supprimer</button>
      </td>
    </tr>`;
  }).join('');
  wrap.innerHTML = `<table><thead><tr><th>Étudiant</th><th>Matière</th><th>Note</th><th>Mention</th><th>Actions</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function addNote() {
  const etuId = document.getElementById('sel-etu').value;
  const mat   = document.getElementById('sel-mat').value;
  const note  = parseFloat(document.getElementById('inp-note').value);
  const err   = document.getElementById('err-note');
  if (!etuId) { err.textContent='Sélectionnez un étudiant.'; err.style.display='block'; return; }
  if (!mat)   { err.textContent='Sélectionnez une matière.'; err.style.display='block'; return; }
  if (isNaN(note)||note<0||note>20) { err.textContent='La note doit être entre 0 et 20.'; err.style.display='block'; return; }
  err.style.display='none';
  notes.push({ id:nextId++, etuId, matiere:mat, note });
  document.getElementById('inp-note').value = '';
  renderProfStats(); renderTableProf(); renderStuList();
  showToast('Note ajoutée avec succès !');
}

function delNote(id) {
  notes = notes.filter(n=>n.id!==id);
  renderProfStats(); renderTableProf(); renderStuList();
  showToast('Note supprimée.', 'error');
}

function startEdit(id) {
  const n = notes.find(x=>x.id===id);
  if (!n) return;
  const row = document.getElementById('row-'+id);
  const tds = row.querySelectorAll('td');
  tds[2].innerHTML = `<input class="edit-input" type="number" id="edit-inp-${id}" min="0" max="20" step="0.5" value="${n.note}" />`;
  tds[4].innerHTML = `<button class="btn btn-green btn-sm" onclick="saveEdit(${id})" style="margin-right:6px">✓ Sauvegarder</button><button class="btn btn-secondary btn-sm" onclick="renderTableProf()">Annuler</button>`;
  row.classList.add('editing');
}

function saveEdit(id) {
  const val = parseFloat(document.getElementById('edit-inp-'+id).value);
  if (isNaN(val)||val<0||val>20) { showToast('Note invalide.','error'); return; }
  const n = notes.find(x=>x.id===id);
  if (n) n.note = val;
  renderProfStats(); renderTableProf(); renderStuList();
  showToast('Note modifiée avec succès !');
}

function renderStuList() {
  document.getElementById('stu-list-prof').innerHTML = Object.entries(ETUDIANTS).map(([id,e]) => {
    const eNotes = notes.filter(n=>n.etuId===id);
    const moyVal = avg(eNotes.map(n=>n.note));
    const pct = moyVal!==null ? Math.round(moyVal/20*100) : 0;
    return `<div class="stu-row">
      <div class="stu-left">
        <div class="stu-avatar">${e.initiales}</div>
        <div><div class="stu-name">${e.nom}</div><div class="stu-meta">${id} · ${e.groupe} · ${eNotes.length} note(s)</div></div>
      </div>
      <div class="stu-right">
        ${moyVal!==null?`
          <div class="progress-bar-wrap"><div class="progress-bar" style="width:${pct}%;background:${moyVal>=10?'var(--green)':moyVal>=8?'var(--amber)':'var(--red)'}"></div></div>
          <span class="note-chip ${noteChip(moyVal)}">${fmt(moyVal,1)}</span>
          <span class="badge ${noteBadge(moyVal)}">${mentionShort(moyVal)}</span>
        `:'<span style="color:var(--text3);font-size:12px">Aucune note</span>'}
      </div>
    </div>`;
  }).join('');
}

function switchTab(...panelIds) {
  const active = panelIds[0];
  panelIds.forEach(id => { const p=document.getElementById(id); if(p) p.classList.toggle('active',id===active); });
  const tabs = document.querySelectorAll('#tabs-prof .tab');
  ['t-saisie','t-liste','t-etudiants'].forEach((id,i) => tabs[i].classList.toggle('active', id===active));
  if (active==='t-liste')     renderTableProf();
  if (active==='t-etudiants') renderStuList();
}

// Init
populateSelEtu();
populateFilterEtu();
renderProfStats();
renderTableProf();
renderStuList();
</script>
</body>
</html>
